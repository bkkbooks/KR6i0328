  - {type: variant, offset: 5158, length: 168, content: 佛告大慧：「一切凡夫執著名相隨順生法，隨順生法已見種種相，墮我我所邪見心中，執著具足一切法相，執著已入於無明黑闇障處，入障處已起於貪心，起貪心已而能造作貪瞋癡業，造業行已不能自止，如蠶作繭以分別心而自纏身，墮在＝於【三】在【大】，於【宋】【元】【明】在於六道大海險難，如轆轤迴轉不自覺知，以無智故不知一切諸法如幻，不知無我我所諸法非實從於妄想分別而生，而不知離可見能見，而不知離生住滅相，不知自心虛妄而生，謂〔知〕－【三】知【大】，〔－〕【宋】【元】【明】知隨順自, 宮: ''}
