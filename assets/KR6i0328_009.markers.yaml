  - {type: variant, offset: 2415, length: 1240, content: '有四種記＝說【三】【宮】記【大】，說【宋】【元】【明】【宮】記說法，一往答反問；

      分別差別答，默答遮外道。

      世諦一切有，第一義諦無；

      而實體無相，是第一義諦。

      見於虛妄法，是故說世諦；

      因於言語生，無如是實體。

      無事有言語，世諦中實無；

      是即顛倒事，可見亦是無。

      若事顛倒有，寂靜畢竟無；

      依於顛倒事，及見諸法生。

      畢竟定是無，即是＝是即【三】【宮】即是【大】，是即【宋】【元】【明】【宮】即是是即無體相；

      所見諸種種，熏習煩惱生。

      心見外迷惑，現取於前境；

      分別無分別，是空實相法。

      如幻像諸相，如樹葉金色；

      是可見人見，心無明熏習。

      聖人不見迷，中間不見實；

      迷惑即是實，以實即中間。

      遠離諸迷惑，若能生諸相；

      即是其迷惑，如眼瞖𪾼不淨。

      如瞖見毛輪，依迷取諸法；

      於諸境界中，愚癡取是法。

      諸法如毛輪，陽炎水迷惑；

      三界如夢幻，修行得解脫。

      分別可分別，能生於分別；

      縛可縛及因，六種解脫因。

      無地及諸諦，無國土及化；

      佛辟支聲聞，惟是心分別。

      人體及五陰，諸緣及微塵；

      勝人自在作，惟是心分別。

      心遍一切處，一切處皆心；

      以心不善觀，心性無諸相＝性【三】相【大】，性【宋】【元】【明】相性。

      五陰中無我，我中無五陰；

      分別無是法，而彼法非無。

      如愚癡分別，有諸一切法；

      如是見實有，一切應見實。

      一切法若無，無染亦無淨；

      愚癡見如是，彼法不如是。

      迷惑分別相，是他力分別；

      彼相所有名，是名分別相。

      名相是分別，因緣事和合；

      若不生彼心，是第一義相。

      報相佛實體，及所化佛相；

      眾生及菩薩，并十方國土。

      習氣法化佛，及作於化佛；

      是皆一切從，阿彌陀國出＝土【宮】出【大】，土【宮】出土。

      應化所說法，及報佛說法；

      修多羅廣說，汝應知密＝蜜【明】密【大】，蜜【明】密蜜意。

      所有佛子說，及於諸如來；

      是皆化佛說，非淳熟者說。

      是諸法不生，而彼法非無；

      乾闥婆城幻，如夢化相似。

      種種隨心轉，惟心非餘法；

      心生種種生，心滅種種滅。

      眾生妄分別，無物而見物；

      無義惟是心，無分別得脫。

      無始世戲論，依止於煩惱；

      諸分別熏修，是故邪見生。

      識無分別義，真如是智境；

      轉彼是寂靜，是諸聖境界。

      觀察義思惟，諸凡夫思惟；

      念真如思惟，諸佛淨思惟。

      分別諸法體，一切法不生；

      依他力因緣，眾生迷分別。

      他力若清淨，離分別相應；

      轉彼即真如，離分別是行。

      莫分別分別，分別是無實；

      分別迷惑法，取可取不盡。

      見外分別境，分別是實體；

      心分別分別，彼法因緣生。

      邪見見外義，無義但是心；

      觀斟量相應，能滅取可取。

      無諸外境界，愚癡妄分別；

      熏習增長心，似生於諸法。

      滅二種分別，真如智境界；

      生於無法相，不思議聖境。

      名相及分別，實體二種相；

      正智及真如，是成就實體。

      依父母和合，阿梨耶意合；

      如蘇＝酥【明】蘇【大】，酥【明】蘇酥瓶等鼠，共赤白增長。

      辟＝譬【宋】，蔽【明】辟【大】，譬【宋】，蔽【明】辟譬蔽尸厚泡＝皰【元】【明】泡【大】，皰【元】【明】泡皰瘡，不淨依節畫＝盡【三】畫【大】，盡【宋】【元】【明】畫盡；

      業風長四大，如諸果成熟。

      五及於五五，及有九種孔；

      諸毛甲遍覆，如是增長生。

      生如糞中蟲，如人睡中寤；

      眼見色起念，增長生分別。

      分別及專念，齗【CB】【麗-CB】，斷【大】齗K10n0160_p0902a17T16n0672_p0627c11斷齒脣和合；

      口始說言語，如鸚鵡弄聲。

      諸外道說定，大乘不決定；

      依眾生心定，邪見不能近。

      我乘內證智，妄覺非境界；

      如來滅世後，誰持為我說？

      如來滅度後，未來當有人；

      大慧汝諦聽，有人持我法。

      於南大國中，有大德比丘；

      名龍樹菩薩，能破有無見。

      為人說我法＝乘【三】【宮】法【大】，乘【宋】【元】【明】【宮】法乘，大乘無上法；

      證得歡喜地，往生安樂國。

      智慧觀察法，不見實法體；

      是故不可說，及說亦無體。

      若因緣生法，不得言有無；

      因緣中有物，愚分別有無。

      邪見二邪法，我知離我法；

      一切法名字，無量劫常學。

      以學復更學，迭＝迷【明】迭【大】，迷【明】迭迷共相分別；

      若不說諸名，諸世間迷惑。

      是故作名字，為除迷惑業；

      依三種分別，愚癡分別法。

      依名迷分別，及因緣能生；

      法不滅不生，自性如虛空。

      法無體是體，分別相即體；

      影像及於幻，陽焰與夢響，

      火輪乾闥婆，諸法如是生；

      不二真如空，實際及法體。

      我說無分別，成就彼法相；

      口心境界虛，實乃＝及【三】【宮】乃【大】，及【宋】【元】【明】【宮】乃及立虛妄。

      心墮於二邊，是故立分別；

      有無墮二邊，以在心境界。

      遠離諸境界，爾時正滅心；

      以離取境界，彼滅非有無。

      如聖人境界，愚人不能知；

      有滅住真如，智慧者能見。

      如彼諸法住，智慧者能見；

      法體不如是，以諸法無相。', 宮: ''}
